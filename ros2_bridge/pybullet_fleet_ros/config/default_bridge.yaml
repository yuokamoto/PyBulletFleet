# ros2_bridge/pybullet_fleet_ros/config/default_bridge.yaml
pybullet_fleet_bridge:
  ros__parameters:
    config_yaml: ""        # Required — path to PyBulletFleet YAML config
    publish_rate: 50.0
    gui: false              # Override YAML gui setting
    physics: false           # Override YAML physics setting
    target_rtf: 1.0          # Override YAML target_rtf setting
    enable_sim_services: true
