# Bridge config: 2 mobile robots + 1 floating 6-DoF cube.
#
# Demonstrates the OmniController's full 6-DoF velocity control by mixing two
# ground mobile robots (differential) with a floating cube that responds to
# cmd_vel in all 6 DoF (including angular.x / angular.y for roll / pitch).
#
# Usage (Docker):
#   cd docker
#   docker compose run --rm --name pbf_bridge bridge \
#     ros2 run pybullet_fleet_ros bridge_node --ros-args \
#       -p config_yaml:=/rmf_demos_ws/src/pybullet_fleet_ros/config/bridge_omni_demo.yaml \
#       -p gui:=true
#
# Then drive the cube (6-DoF):
#   ros2 topic pub -r 10 /cube0/cmd_vel geometry_msgs/msg/Twist \
#     "{linear: {z: 0.5}, angular: {x: 0.3, y: 0.2, z: 0.1}}"

simulation:
  gui: true
  physics: false

entities:
  - name: robot0
    urdf_path: "robots/mobile_robot.urdf"
    pose: [0.0, 0.0, 0.05]
    yaw: 0.0
    motion_mode: "differential"
    controller:
      type: "differential"
      max_linear_vel: 2.0
      max_angular_vel: 3.0

  - name: cube0
    urdf_path: "robots/simple_cube.urdf"
    pose: [2.0, 0.0, 0.5]
    yaw: 0.0
    motion_mode: "omnidirectional"
    controller:
      type: "omni"
      max_linear_vel: 1.0
      max_angular_vel: 2.0

  - name: robot1
    urdf_path: "robots/mobile_robot.urdf"
    pose: [4.0, 0.0, 0.05]
    yaw: 1.57
    motion_mode: "differential"
    controller:
      type: "differential"
      max_linear_vel: 2.0
      max_angular_vel: 3.0
