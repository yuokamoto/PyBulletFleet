# Bridge config: mobile robot + 3D omni cube demo
#
# Demonstrates OmniController 6-DoF by mixing a ground mobile robot
# with a floating cube that can be controlled in all 6 DoF via cmd_vel.
#
# Usage (Docker):
#   cd docker
#   docker compose run --rm bridge ros2 run pybullet_fleet_ros bridge_node \
#     --ros-args -p config_yaml:=/opt/bridge_ws/src/pybullet_fleet_ros/config/bridge_omni_demo.yaml -p gui:=true
#
# Then control the cube (6-DoF):
#   ros2 topic pub /cube0/cmd_vel geometry_msgs/Twist \
#     "{linear: {x: 0, y: 0, z: 0.5}, angular: {x: 0.3, y: 0.2, z: 0.1}}"

simulation:
  gui: true
  physics: false

robots:
  - name: robot0
    urdf_path: "robots/mobile_robot.urdf"
    pose: [0.0, 0.0, 0.05]
    yaw: 0.0

  - name: cube0
    urdf_path: "robots/simple_cube.urdf"
    pose: [2.0, 0.0, 0.5]
    yaw: 0.0
    controller_config: "omni"

  - name: robot1
    urdf_path: "robots/mobile_robot.urdf"
    pose: [4.0, 0.0, 0.05]
    yaw: 1.57
