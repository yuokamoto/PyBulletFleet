# Bridge config for office demo — tinyRobot1 + tinyRobot2 + doors
# Same robots and spawn positions as rmf_demos office demo.
#
# Charger positions (from office.building.yaml):
#   tinyRobot1_charger: (10.433, -5.575)
#   tinyRobot2_charger: (20.422, -5.312)
#
# Robot model: Converted on-the-fly from TinyRobot SDF (rmf_demos_assets).
# World model: Loaded from building SDF with per-link poses (rmf_demos_maps).
#
# Doors:
#   main_door:     (13.132, -2.579)  DoubleSwingDoor → simulated as single hinge
#   coe_door:      (8.078, -5.898)   SwingDoor
#   hardware_door: (19.450, -10.319) SwingDoor

# handler_map assigns RMF protocol handlers to doors.
handler_map:
  "*_door": pybullet_fleet_ros.door_handler.DoorHandler

simulation:
  gui: true
  physics: false
  target_rtf: 10.0  # Real-time factor (1.0 = real-time, 0 = max speed)
  enable_structure_transparency: true
  camera:
    camera_mode: manual
    camera_distance: 40
    camera_yaw: 0
    camera_pitch: -70
    camera_target: [15, -3, 0]

# Office building + furniture — full .world file from rmf_demos_maps.
# Parsed by load_sdf_world_file(): resolves <include> elements,
# downloads Gazebo Fuel models (chairs, desks, etc.) on first run.
world:
  world_file: "/rmf_demos_ws/install/rmf_demos_maps/share/rmf_demos_maps/maps/office/office.world"
  # Robot/plugin models handled separately — skip in world loading
  skip_models:
    - TinyRobot
    - TeleportDispenser
    - TeleportIngestor

# WorkcellHandler — handles RMF standard delivery tasks.
# RMF internally publishes DispenserRequest/IngestorRequest when a
# delivery task reaches a pickup/dropoff waypoint.  WorkcellHandler
# subscribes, delegates PickAction/DropAction to WorkcellPlugin, and
# publishes DispenserResult/IngestorResult so the task can proceed.
# Without this, the RMF task dispatcher waits forever for the result.
bridge_plugins:
  - class: pybullet_fleet_ros.workcell_handler.WorkcellHandler
    config:
      item_search_radius: 1.0
      attach_z_offset: 0.15
      # Workcell positions from office nav graph waypoints.
      # Workcell positions from the generated office.world SDF.
      # These correspond to the TeleportDispenser/TeleportIngestor model
      # poses, NOT the navigation waypoints (which are on the floor where
      # the robot stops).  Items are teleported to these positions during
      # pick/drop, matching Gazebo's teleport behaviour.
      overrides:
        coke_dispenser:
          position: [17.755, -5.501, 1.08]     # SDF model pose (pantry counter)
          item:                        # fallback cargo uses coke mesh
            mesh_path: "/root/.gz/fuel/fuel.gazebosim.org/openrobotics/models/coke/6/meshes/coke.obj"
            mesh_scale: [1.0, 1.0, 1.0]
            mass: 0.3
          spawn_offset: [0.0, 0.0, 0.02, 0.0, 0.0, 0.0]  # slight offset above counter
          item_search_radius: 2.0      # wider: waypoint is ~0.9m from model
        coke_ingestor:
          position: [22.543, -7.610, 0.805]    # SDF model pose (hardware_2 desk)
        coke_ingestor_2:
          position: [5.661, -5.959, 0.80]      # SDF model pose (coe desk)

entities:
  - name: tinyRobot1
    sdf_path: "/rmf_demos_ws/install/rmf_demos_assets/share/rmf_demos_assets/models/TinyRobot/model.sdf"
    pose: [10.433, -5.575, 0.0]
    yaw: 0.0
    motion_mode: "differential"
    max_linear_vel: 0.5
    max_linear_accel: 0.75
    navigation_2d: true
    controller_config:
      type: differential
      default_direction: auto

  - name: tinyRobot2
    sdf_path: "/rmf_demos_ws/install/rmf_demos_assets/share/rmf_demos_assets/models/TinyRobot/model.sdf"
    pose: [20.422, -5.312, 0.0]
    yaw: 0.0
    motion_mode: "differential"
    max_linear_vel: 0.5
    max_linear_accel: 0.75
    navigation_2d: true
    controller_config:
      type: differential
      default_direction: auto

  # ── Doors (Door) ─────────────────────────────
  # Positions are at hinge vertex (v1) from office.building.yaml.
  # Yaw points from hinge toward free end (v1→v2 direction).
  - name: main_door
    type: door
    urdf_path: "robots/door_hinge.urdf"
    pose: [12.184, -2.600, 0.0]
    yaw: 0.022
    collision_mode: disabled
    use_fixed_base: true
    open_positions: {hinge: 1.57}
    close_positions: {hinge: 0.0}

  - name: coe_door
    type: door
    urdf_path: "robots/door_hinge.urdf"
    pose: [8.256, -5.493, 0.0]
    yaw: -1.986
    collision_mode: disabled
    use_fixed_base: true
    open_positions: {hinge: -1.57}
    close_positions: {hinge: 0.0}

  - name: hardware_door
    type: door
    urdf_path: "robots/door_hinge.urdf"
    pose: [19.448, -10.764, 0.0]
    yaw: 1.566
    collision_mode: disabled
    use_fixed_base: true
    open_positions: {hinge: -1.57}
    close_positions: {hinge: 0.0}
