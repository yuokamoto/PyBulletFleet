# Bridge config: TurtleBot3 Burger (Tier 2 — requires ros-${ROS_DISTRO}-turtlebot3-description)
#
# Demonstrates Tier 2 URDF resolution: the bridge resolves the model name
# "turtlebot3" to the installed ROS package path via resolve_model().
# This is the standard ROS 2 mobile robot for navigation demos.
#
# Prerequisites:
#   apt install ros-${ROS_DISTRO}-turtlebot3-description
#
# Usage (Docker):
#   docker compose run --rm bridge ros2 run pybullet_fleet_ros bridge_node \
#     --ros-args -p config_yaml:=/rmf_demos_ws/src/pybullet_fleet_ros/config/bridge_tb3.yaml
#
# GUI mode:
#   GUI=true docker compose run --rm bridge ros2 run pybullet_fleet_ros bridge_node \
#     --ros-args -p config_yaml:=/rmf_demos_ws/src/pybullet_fleet_ros/config/bridge_tb3.yaml
#
# Then send navigation goals:
#   python3 scripts/send_nav_goal.py --robot tb3_0 --x 2.0 --y 1.0

simulation:
  gui: true
  physics: false

robots:
  - name: tb3_0
    urdf_path: "turtlebot3"
    pose: [0.0, 0.0, 0.01]
    yaw: 0.0
    motion_mode: "differential"
    max_linear_vel: 0.22
    max_linear_accel: 2.5
    max_angular_vel: 2.84
    max_angular_accel: 10.0
