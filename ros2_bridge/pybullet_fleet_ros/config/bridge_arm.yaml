# Bridge config: Arm robot for joint trajectory tests
#
# テスト 4 向け: joint_trajectory / FollowJointTrajectory アクション
#
# Usage (Docker):
#   docker compose run --rm -d --name pbf_bridge bridge \
#     ros2 run pybullet_fleet_ros bridge_node \
#       --ros-args -p config_yaml:=/rmf_demos_ws/src/pybullet_fleet_ros/config/bridge_arm.yaml
#
# GUI mode:
#   GUI=true docker compose run --rm --name pbf_bridge bridge \
#     ros2 run pybullet_fleet_ros bridge_node \
#       --ros-args -p config_yaml:=/rmf_demos_ws/src/pybullet_fleet_ros/config/bridge_arm.yaml

simulation:
  gui: true
  physics: false

entities:
  - name: arm0
    urdf_path: "robots/arm_robot.urdf"
    pose: [0.0, 0.0, 0.0]
    yaw: 0.0
    use_fixed_base: true
