# Bridge config for airport_terminal demo — multi-fleet
# Demonstrates 4 fleets sharing a single PyBulletFleet bridge_node.
#
# Fleet 1: tinyRobot     (nav_graph 2) — 4 robots, patrol + delivery
# Fleet 2: deliveryRobot  (nav_graph 1) — 3 robots, delivery
# Fleet 3: cleanerBotA    (nav_graph 0) — 1 robot, clean (zone 1–4)
# Fleet 4: cleanerBotE    (nav_graph 4) — 2 robots, clean (zone 2–4)
# (caddy is read-only / passive — not spawned)
#
# Add more fleets by:
#   1. Adding robots here under the entities: section
#   2. Adding a fleet_adapter Node in airport_terminal_pybullet.launch.py

handler_map:
  "*_door": pybullet_fleet_ros.door_handler.DoorHandler

bridge_plugins:
  - class: pybullet_fleet_ros.workcell_handler.WorkcellHandler
    config:
      item_search_radius: 2.0
      attach_z_offset: 0.15
      # Workcell positions from generated airport_terminal.world SDF.
      # These correspond to the TeleportDispenser/TeleportIngestor model
      # poses, matching Gazebo's teleport behaviour for pick/drop.
      overrides:
        mopcart_dispenser:
          position: [23.346, -36.437, 0.0]   # SDF model pose (floor level)
          item:                               # fallback cargo uses MopCart3 mesh
            mesh_path: "/root/.gz/fuel/fuel.gazebosim.org/openrobotics/models/mopcart3/2/meshes/MopCart3.obj"
            mesh_scale: [1.0, 1.0, 1.0]
            mass: 5.0
          item_search_radius: 2.0             # waypoint ~1.2m from model
        mopcart_collector:
          position: [26.063, -48.377, 0.0]    # SDF model pose (floor level)

simulation:
  gui: true
  physics: false
  target_rtf: 10.0
  camera:
    camera_mode: auto
    camera_auto_scale: 1.2

world:
  world_file: "/rmf_demos_ws/install/rmf_demos_maps/share/rmf_demos_maps/maps/airport_terminal/airport_terminal.world"
  skip_models:
    - TinyRobot
    - DeliveryRobot
    - CleanerBotA
    - CleanerBotE
    - Caddy
    - TeleportDispenser
    - TeleportIngestor

entities:
  # ── Fleet: tinyRobot (nav_graph 2) ───────────────────────────────
  # Spawn positions from airport_terminal.world (charger waypoints)
