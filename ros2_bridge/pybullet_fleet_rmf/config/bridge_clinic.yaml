# Bridge config for clinic demo — 2 fleets + doors + elevators
# Multi-floor clinic with 9 L1 doors + 4 L2 doors, 4 elevators, 2 robot fleets
#
# Fleet 1: deliveryRobot  (nav_graph 0) — 2 robots (L1)
# Fleet 2: tinyRobot      (nav_graph 1) — 2 robots (L2)
#
# Robot names/positions from clinic.world SDF <include> poses.
# Door names/positions from clinic.world SDF <model> + register_component Door.
# Lift positions from clinic.world SDF <model> poses.
# Floor elevations from clinic.building.yaml: L1=0, L2=10.

handler_map:
  "L1_*": pybullet_fleet_rmf.door_handler.DoorHandler
  "L2_*": pybullet_fleet_rmf.door_handler.DoorHandler
  "m": pybullet_fleet_rmf.door_handler.DoorHandler
  "lift_*": pybullet_fleet_rmf.lift_handler.LiftHandler

simulation:
  gui: true
  physics: false
  target_rtf: 3.0
  publish_rate: 1  # Hz (sim-time) — at RTF=3 this is ~3 Hz wall-clock
  enable_structure_transparency: true
  camera:
    camera_mode: manual
    camera_distance: 50
    camera_yaw: 0
    camera_pitch: -70
    camera_target: [30, -25, 0]

world:
  world_file: "/rmf_demos_ws/install/rmf_demos_maps/share/rmf_demos_maps/maps/clinic/clinic.world"
  skip_models:
    - DeliveryRobot
    - TinyRobot
    - TeleportDispenser
    - TeleportIngestor

entities:
  # ── Fleet: deliveryRobot (nav_graph 0, L1) ─────────
  - name: deliveryRobot_1
    sdf_path: "/rmf_demos_ws/install/rmf_demos_assets/share/rmf_demos_assets/models/DeliveryRobot/model.sdf"
    pose: [8.007, -31.734, 0.0]
    yaw: -3.1398
    motion_mode: "differential"
    max_linear_vel: 0.7
    max_linear_accel: 0.5
    navigation_2d: true
    controller_config:
      type: differential
      config:
        default_direction: auto

  - name: deliveryRobot_2
    sdf_path: "/rmf_demos_ws/install/rmf_demos_assets/share/rmf_demos_assets/models/DeliveryRobot/model.sdf"
    pose: [12.832, -38.547, 0.0]
    yaw: 0.1635
    motion_mode: "differential"
    max_linear_vel: 0.7
    max_linear_accel: 0.5
    navigation_2d: true
    controller_config:
      type: differential
      config:
        default_direction: auto

  # ── Fleet: tinyRobot (nav_graph 1, L2) ─────────────
  - name: tinyRobot_1
    sdf_path: "/rmf_demos_ws/install/rmf_demos_assets/share/rmf_demos_assets/models/TinyRobot/model.sdf"
    pose: [54.763, -10.800, 10.0]
    yaw: 3.1343
    motion_mode: "differential"
    max_linear_vel: 0.5
    max_linear_accel: 0.75
    navigation_2d: true
    controller_config:
      type: differential
      config:
        default_direction: auto

  - name: tinyRobot_2
    sdf_path: "/rmf_demos_ws/install/rmf_demos_assets/share/rmf_demos_assets/models/TinyRobot/model.sdf"
    pose: [54.789, -12.921, 10.0]
    yaw: 3.1416
    motion_mode: "differential"
    max_linear_vel: 0.5
    max_linear_accel: 0.75
    navigation_2d: true
    controller_config:
      type: differential
      config:
        default_direction: auto

  # ── L1 Doors ─────────────────────────────────────────
  - name: L1_clinic_a
    type: door
    urdf_path: "robots/door_slide.urdf"
    pose: [17.011, -41.769, 0.0]
    yaw: 3.1416
    use_fixed_base: true
    open_positions: {slide: 1.0}
    close_positions: {slide: 0.0}

