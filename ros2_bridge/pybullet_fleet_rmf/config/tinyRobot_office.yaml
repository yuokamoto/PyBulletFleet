# FLEET CONFIG =================================================================
# Custom tinyRobot fleet config for office PyBulletFleet bridge.
#
# Based on rmf_demos office/tinyRobot_config.yaml with adjustments:
#   - finishing_request: "nothing" — avoids charge deadlock (sim robots always 100%)
#   - recharge_soc: 0.20 — low threshold so sim battery (always 100%) passes immediately

rmf_fleet:
  name: "tinyRobot"
  limits:
    linear: [0.5, 0.75] # velocity, acceleration
    angular: [0.6, 2.0] # velocity, acceleration
  profile: # Robot profile is modelled as a circle
    footprint: 0.3 # radius in m
    vicinity: 0.5 # radius in m
  reversible: True # whether robots in this fleet can reverse
  battery_system:
    voltage: 12.0 # V
    capacity: 24.0 # Ahr
    charging_current: 5.0 # A
  mechanical_system:
    mass: 20.0 # kg
    moment_of_inertia: 10.0 #kgm^2
    friction_coefficient: 0.22
  ambient_system:
    power: 20.0 # W
  tool_system:
    power: 0.0 # W
  recharge_threshold: 0.10
  recharge_soc: 0.20 # Low threshold so robot (always 100%) passes immediately
  publish_fleet_state: 10.0
  account_for_battery_drain: True
  task_capabilities:
    loop: True
    delivery: True
  finishing_request: "nothing" # Fleet default: no charge — sim battery always 100%
  robots:
    tinyRobot1:
      charger: "tinyRobot1_charger"
      finishing_request:
        type: "park"
        waypoint_name: "supplies"  # Match rmf_demos: idle at supplies waypoint
    tinyRobot2:
      charger: "tinyRobot2_charger"

fleet_manager:
  ip: "127.0.0.1"
  port: 22011
  user: "some_user"
  password: "some_password"
