  # ── Elevators (Elevator) ─────────────────────
  # Positions extracted from hotel.world SDF <model name="Lift*"><pose>
  - name: Lift1
    type: elevator
    urdf_path: "robots/elevator.urdf"
    pose: [19.766, -18.931, 0.0]
    yaw: 0.0
    collision_mode: disabled
    use_fixed_base: true
    floors: {L1: 0.0, L2: 8.0, L3: 16.0}
