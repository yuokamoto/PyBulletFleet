name: Bridge Integration

# ros2_bridge is excluded from pre-commit and pytest (it needs a ROS 2 runtime),
# so this Docker job is its only automated coverage. Path-filtered: it runs only
# when the bridge, its Docker setup, or bundled robot/world assets change, so
# ordinary PRs stay fast.
on:
  push:
    branches: [ main ]
    paths:
      - 'ros2_bridge/**'
      - 'docker/**'
      - 'pybullet_fleet/robots/**'
      - 'pybullet_fleet/config/**'
      - 'pybullet_fleet/mesh/**'
      - '.github/workflows/bridge.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ros2_bridge/**'
      - 'docker/**'
      - 'pybullet_fleet/robots/**'
      - 'pybullet_fleet/config/**'
      - 'pybullet_fleet/mesh/**'
      - '.github/workflows/bridge.yml'

concurrency:
  group: bridge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    name: ROS 2 Bridge Integration (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Build bridge image
        run: docker compose -f docker/docker-compose.yaml build bridge

      - name: Run bridge unit tests (colcon)
        # In-package pytest unit tests for pybullet_fleet_ros and pybullet_fleet_rmf,
        # run inside the built image so rclpy and the message types (incl. RMF) are
        # available. The two @pytest.mark.launch_test files are excluded here:
        # launch_testing's TestCases each call rclpy.init() in setUpClass and
        # conflict when co-run in one pytest process ("Context.init() must only be
        # called once"). The running-bridge behaviour they cover is exercised by the
        # integration smoke below; run them standalone with `launch_test`.
        run: |
          docker compose -f docker/docker-compose.yaml run --rm --no-deps bridge bash -c '
            source /opt/ros/jazzy/setup.bash
            source /rmf_demos_ws/install/setup.bash
            cd /rmf_demos_ws
            colcon test --packages-select pybullet_fleet_ros pybullet_fleet_rmf \
              --return-code-on-test-failure --event-handlers console_direct+ \
              --pytest-args -m "not launch_test"
          '

      - name: Run integration smoke test
        # test_integration.sh spawns robot0/1/2 from bridge_test.yaml (gui:=false)
        # and checks topics, services, cmd_vel, and simulation_interfaces calls.
        run: |
          cd docker
          docker compose run --rm --no-deps \
            -v "$(pwd)/test_integration.sh:/test_integration.sh:ro" \
            bridge bash /test_integration.sh

      - name: Run RMF integration smoke test
        # Launches the headless office RMF demo and asserts the RMF stack stands
        # up (fleet/door/lift/dispenser/ingestor topics) and the bridge executes
        # a direct NavigateToPose (deterministic: no dispatcher/traffic-schedule
        # dependency). This is the blocking RMF gate.
        run: |
          cd docker
          docker compose run --rm --no-deps \
            -v "$(pwd)/test_rmf_smoke.sh:/test_rmf_smoke.sh:ro" \
            -v "$(pwd)/rmf_smoke_check.py:/rmf_smoke_check.py:ro" \
            bridge bash /test_rmf_smoke.sh

      - name: Run RMF dispatch E2E (non-blocking)
        # Full dispatch->patrol chain through RMF's dispatcher + traffic schedule.
        # Non-blocking: RMF's distributed coordination is sensitive to host clock
        # jitter and DDS delivery (see test_rmf_dispatch_e2e.sh), which is flaky on
        # some hosts (e.g. WSL2). We run it to observe whether GitHub's runner is
        # stable enough to make this the gate; until then it must not block CI.
        continue-on-error: true
        run: |
          cd docker
          docker compose run --rm --no-deps \
            -v "$(pwd)/test_rmf_dispatch_e2e.sh:/test_rmf_dispatch_e2e.sh:ro" \
            -v "$(pwd)/rmf_dispatch_check.py:/rmf_dispatch_check.py:ro" \
            bridge bash /test_rmf_dispatch_e2e.sh
