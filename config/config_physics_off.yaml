# ========================================
# Physics OFF Mode (Kinematics-focused)
# ========================================
#
# Recommended for:
#   - Warehouse robot path planning
#   - Multi-robot coordination
#   - High-speed simulation (Nx speed)
#   - What-if scenario analysis
#
# Key features:
#   - No stepSimulation() overhead
#   - Deterministic results
#   - Safety margin detection (collision avoidance)
#   - Stable at high speeds (100x+)
# ========================================

# Simulation Parameters
speed: 100                    # High-speed simulation (100x real-time)
timestep: 0.1                # Coarse timestep OK for kinematics
duration: 0                  # Unlimited
gui: true
physics: false               # 🔴 Physics OFF (kinematics mode)
monitor: true
ignore_static_collision: true
enable_profiling: false

# Collision Detection - Kinematics Mode
collision_detection_method: "closest_points"  # 🔴 Distance-based (kinematics-safe)
collision_margin: 0.02                        # 🔴 2cm safety clearance

# Performance Optimization
collision_check_2d: false
enable_monitor_gui: true

# Logging
log_level: info

# Camera
camera:
  camera_mode: manual
  camera_view_type: perspective
  camera_distance: 20.0
  camera_yaw: 45
  camera_pitch: -30
  camera_target: [5, 5, 0]

# Visualizer
enable_visual_shapes: true
enable_collision_shapes: false
enable_structure_transparency: false
enable_shadows: false
enable_gui_panel: false
enable_collision_color_change: false
