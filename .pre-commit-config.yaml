# Pre-commit hooks for PyBulletFleet
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # General fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace          # Remove trailing whitespace
      - id: end-of-file-fixer            # Ensure files end with a newline
      - id: check-yaml                   # Validate YAML files
      - id: check-merge-conflict         # Detect merge conflict markers
      - id: check-toml                   # Validate TOML files (pyproject.toml)
      - id: debug-statements             # Detect debug statements (pdb, breakpoint)
      - id: check-added-large-files      # Prevent large files from being committed
        args: ['--maxkb=2048']            # Allow demo media up to 2 MB
      - id: mixed-line-ending            # Detect mixed line endings (CRLF/LF)


  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=127']

  # Pyright type checking
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.390
    hooks:
      - id: pyright
        # Note: Exclusions are managed in pyrightconfig.json
        # ros2_bridge requires ROS 2 deps only available inside Docker
        exclude: '^ros2_bridge/'
        additional_dependencies:
          - pybullet
          - numpy
          - scipy
          - PyYAML
          - two-point-interpolation
          - pytest

  # Flake8 style checking
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [
          '--max-line-length=127',
          '--extend-ignore=E203,W503,D,Q,I,F841,W291,W293,E128,B902,E402,CNL100',
        ]
        # exclude: '^benchmark/'
